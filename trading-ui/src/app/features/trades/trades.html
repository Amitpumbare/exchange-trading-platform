<div class="trades-book">

  <h2>Trade History</h2>

  <div class="trades-grid">

    <div
      class="trade-card"
      *ngFor="let trade of trades"
      [class.buy]="trade.side === 'BUY'"
      [class.sell]="trade.side === 'SELL'">

      <div class="trade-header">

        <span
          class="type"
          [ngClass]="{
            buy: trade.side === 'BUY',
            sell: trade.side === 'SELL'
          }">

          {{ trade.instrumentSymbol }} {{ trade.side }}

        </span>

      </div>

      <div class="trade-body">

        <div>
          <span class="label">Price</span>
          <span class="value">
            {{ trade.price }}
          </span>
        </div>

        <div>
          <span class="label">Quantity</span>
          <span class="value">
            {{ trade.quantity }}
          </span>
        </div>

        <p class="trade-time">
          {{ trade.executedAt | date:'short' }}
        </p>

      </div>

    </div>

  </div>

</div>
