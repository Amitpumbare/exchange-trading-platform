<div class="depth-layout">

  <div class="depth-panel">

    <h2>Order Book</h2>
    <small class="hint">Buy vs Sell (Live Market Depth)</small>

    <div *ngIf="loading" class="loading">
      Loading…
    </div>

    <div class="depth-table">

      <!-- HEADER -->

      <div class="depth-row header">

        <span>Buy Qty</span>
        <span>Buy Price</span>
        <span>Sell Price</span>
        <span>Sell Qty</span>

      </div>

      <!-- DEPTH ROWS -->

      <div
        class="depth-row"
        *ngFor="let level of levels; let i = index">

        <span class="bid-qty">
          {{ bids[i]?.quantity || '' }}
        </span>

        <span class="bid-price">
          {{ bids[i]?.price || '' }}
        </span>

        <span class="ask-price">
          {{ asks[i]?.price || '' }}
        </span>

        <span class="ask-qty">
          {{ asks[i]?.quantity || '' }}
        </span>

      </div>

    </div>

  </div>

</div>
