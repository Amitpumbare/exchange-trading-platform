<div class="auth-background">

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()">

    <h2>Reset Password</h2>

    <label>New Password:</label>

    <input
      type="password"
      formControlName="password"
      placeholder="Enter new password">

    <span class="error"
          *ngIf="password?.invalid && password?.touched">

      Minimum 8 characters

    </span>

    <button type="submit">
      Reset Password
    </button>

  </form>

</div>
