<div class="auth-background">

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

    <h2>Create Account</h2>

    <!-- Full Name -->
    <label>Full Name</label>
    <input type="text" formControlName="fullName" placeholder="Enter full name"/>

    <span class="error"
          *ngIf="fullName?.invalid && (fullName?.touched || fullName?.dirty)">
      Name is required (min 3 characters)
    </span>

    <!-- Email -->
    <label>Email</label>
    <input type="text" formControlName="email" placeholder="Enter email"/>

    <span class="error"
          *ngIf="email?.invalid && (email?.touched || email?.dirty)">
      Enter a valid email
    </span>

    <!-- Password -->
    <label>Password</label>
    <div class="password-field">
      <input
        [attr.type]="showPassword ? 'text' : 'password'"
        formControlName="password"
        placeholder="Enter password"
      />

      <span class="eye-icon" (click)="togglePassword()">
        <i [class]="showPassword ? 'fa fa-eye' : 'fa fa-eye-slash'"></i>
      </span>
    </div>

    <span class="error"
          *ngIf="password?.invalid && (password?.touched || password?.dirty)">
      Must be 8+ chars with uppercase, lowercase, number & symbol
    </span>

    <!-- Confirm Password -->
    <label>Confirm Password</label>
    <div class="password-field">
      <input
        [attr.type]="showConfirmPassword ? 'text' : 'password'"
        formControlName="confirmPassword"
        placeholder="Confirm password"
      />

      <span class="eye-icon" (click)="toggleConfirmPassword()">
        <i [class]="showConfirmPassword ? 'fa fa-eye' : 'fa fa-eye-slash'"></i>
      </span>
    </div>

    <span class="error"
          *ngIf="signupForm.errors?.['passwordMismatch'] && (confirmPassword?.touched || confirmPassword?.dirty)">
      Passwords do not match
    </span>

    <button type="submit">Create Account</button>

  </form>

</div>
