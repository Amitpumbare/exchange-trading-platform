<div class="auth-background">

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()">

    <h2>Forgot Password</h2>

    <label>Email:</label>

    <input
      type="text"
      formControlName="email"
      placeholder="Enter your email">

    <span class="error"
          *ngIf="email?.invalid && email?.touched">

      Enter valid email

    </span>

    <button type="submit">
      Send Reset Link
    </button>

    <div style="margin-top:15px;text-align:center;">

      <a
        routerLink="/login"
        class="auth-link">

        ← Back to Login

      </a>

    </div>

  </form>

</div>
