name: Trading Platform CI

on:
  push:
    branches:
      - main
      - feature/*

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven project
        run: mvn -B clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/trading-backend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/trading-backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/trading-frontend ./trading-ui

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/trading-frontend